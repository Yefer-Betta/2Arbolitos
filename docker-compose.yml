services:
  db:
    image: mysql:8.0
    container_name: 2arbolitos-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-2arbolitos_segura_2024}
      MYSQL_DATABASE: 2arbolitos
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - 2arbolitos-net

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: 2arbolitos-backend
    container_name: 2arbolitos-backend
    restart: unless-stopped
    init: true
    environment:
      PORT: 3002
      NODE_ENV: production
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD:-2arbolitos_segura_2024}@db:3306/2arbolitos?schema=public&charset=utf8mb4
      JWT_SECRET: ${JWT_SECRET:-2arbolitos_jwt_autogenerated}
      JWT_EXPIRES_IN: 7d
      HOST_IP: ${HOST_IP:-0.0.0.0}
      DOCKER: "true"
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - 2arbolitos-net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: 2arbolitos-frontend
    container_name: 2arbolitos-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - 2arbolitos-net

volumes:
  mysql_data:

networks:
  2arbolitos-net:
    driver: bridge
