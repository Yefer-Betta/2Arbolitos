services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: 2arbolitos-app-dev
    environment:
      PORT: 3002
      NODE_ENV: development
      DATABASE_URL: mysql://root:dev_password_123@db:3306/2arbolitos?schema=public&charset=utf8mb4
      JWT_SECRET: dev_jwt_secret_local
      JWT_EXPIRES_IN: 7d
      HOST_IP: ${HOST_IP:-0.0.0.0}
      DOCKER: "true"
    ports:
      - "5173:5173"
      - "3002:3002"
    volumes:
      - ./src:/app/src:ro
      - ./server/src:/app/server/src:ro
      - ./server/prisma:/app/server/prisma:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - 2arbolitos-dev-net

volumes:
  mysql_data_dev:

networks:
  2arbolitos-dev-net:
    driver: bridge
